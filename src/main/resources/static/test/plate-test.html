<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste de Cadastro de Veículos</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f5f7fb; }
    .card { max-width: 760px; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h1 { margin-top: 0; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .full { grid-column: 1 / -1; }
    input, button { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    .buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    button { cursor: pointer; border: none; background: #0d6efd; color: #fff; }
    button.secondary { background: #5c636a; }
    video { margin-top: 14px; width: 100%; max-height: 320px; border-radius: 8px; background: #111; }
    pre { margin-top: 12px; background: #0b1020; color: #d7e3ff; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
<div class="card">
  <h1>Cadastro e Consulta de Placas</h1>

  <div class="grid">
    <input id="plate" placeholder="Placa" />
    <input id="companyName" placeholder="Empresa" />
    <input id="responsibleName" placeholder="Responsável" />
    <input id="phone" placeholder="Telefone" />
    <input id="gate" placeholder="Portão" />
    <input id="status" placeholder="Status" value="LIBERADO" />
  </div>

  <div class="buttons">
    <button id="registerBtn">Cadastrar Veículo</button>
    <button id="lookupBtn" class="secondary">Consultar Placa</button>
    <button id="openCameraBtn" class="secondary">Abrir câmera</button>
    <button id="activateCameraBtn" class="secondary">Ativar câmera</button>
  </div>

  <video id="camera" autoplay playsinline></video>
  <pre id="result">Aguardando ações...</pre>
</div>

<script>
  const result = document.getElementById('result');
  const camera = document.getElementById('camera');

  const fields = {
    plate: document.getElementById('plate'),
    companyName: document.getElementById('companyName'),
    responsibleName: document.getElementById('responsibleName'),
    phone: document.getElementById('phone'),
    gate: document.getElementById('gate'),
    status: document.getElementById('status')
  };

  function payloadFromForm() {
    return {
      plate: fields.plate.value,
      companyName: fields.companyName.value,
      responsibleName: fields.responsibleName.value,
      phone: fields.phone.value,
      gate: fields.gate.value,
      status: fields.status.value
    };
  }

  async function registerVehicle() {
    try {
      const response = await fetch('/api/vehicles', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payloadFromForm())
      });

      const data = await response.json();
      result.textContent = JSON.stringify(data, null, 2);
    } catch (error) {
      result.textContent = 'Erro ao cadastrar veículo: ' + error.message;
    }
  }

  async function lookupPlate() {
    try {
      const response = await fetch(`/api/vehicles/plate/${encodeURIComponent(fields.plate.value)}`);
      const data = await response.json();
      result.textContent = JSON.stringify(data, null, 2);
    } catch (error) {
      result.textContent = 'Erro ao consultar placa: ' + error.message;
    }
  }

  async function activateCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      camera.srcObject = stream;
      result.textContent = 'Câmera ativada com sucesso.';
    } catch (error) {
      result.textContent = 'Erro ao ativar câmera: ' + error.message;
    }
  }

  document.getElementById('registerBtn').addEventListener('click', registerVehicle);
  document.getElementById('lookupBtn').addEventListener('click', lookupPlate);
  document.getElementById('openCameraBtn').addEventListener('click', activateCamera);
  document.getElementById('activateCameraBtn').addEventListener('click', activateCamera);
</script>
</body>
</html>
