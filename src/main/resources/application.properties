spring.application.name=expovigia

spring.datasource.url=jdbc:postgresql://localhost:5432/expovigia
spring.datasource.username=postgres
spring.datasource.password=123

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=public

server.port=8080

logging.level.org.flywaydb=DEBUG

app.plate-ocr.base-url=${APP_PLATE_OCR_BASE_URL:${OCR_CLIENT_BASE_URL:http://localhost:8090}}
app.plate-ocr.endpoint=${APP_PLATE_OCR_ENDPOINT:${OCR_CLIENT_ENDPOINT:/ocr/plate}}
app.plate-ocr.connect-timeout-ms=${APP_PLATE_OCR_CONNECT_TIMEOUT_MS:${OCR_CLIENT_CONNECT_TIMEOUT_MS:3000}}
app.plate-ocr.read-timeout-ms=${APP_PLATE_OCR_READ_TIMEOUT_MS:${OCR_CLIENT_READ_TIMEOUT_MS:10000}}
